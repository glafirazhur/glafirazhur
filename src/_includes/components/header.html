<header class="site-header">
  <a href="/" class="logo" {% if page.url=="/" %}aria-current="page" {% endif %}>{{ site.name }}</a>
  <div class="header-actions">
    <nav aria-label="Main">
      <button id="mobile-menu-toggle" class="mobile-menu-toggle" aria-expanded="false" aria-controls="nav-menu" aria-label="Toggle menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line class="line-top" x1="4" y1="12" x2="20" y2="12"></line>
          <line class="line-mid" x1="4" y1="12" x2="20" y2="12"></line>
          <line class="line-bottom" x1="4" y1="12" x2="20" y2="12"></line>
        </svg>
      </button>
      <ul id="nav-menu" class="nav-links">
        <li><a href="/" {% if page.url=="/" %}aria-current="page" {% endif %}>Home</a></li>
        <li><a href="/blog/" {% if page.url contains "/blog/" %}aria-current="page" {% endif %}>Blog</a></li>
        <li><a href="/talks/" {% if page.url contains "/talks/" %}aria-current="page" {% endif %}>Talks</a></li>
        <li><a href="/contact/" {% if page.url contains "/contact/" %}aria-current="page" {% endif %}>Contact</a></li>
      </ul>
    </nav>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
      <!-- Moon SVG (visible in light mode) -->
      <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
      <!-- Sun SVG (visible in dark mode) -->
      <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="18.36" x2="5.64" y2="16.93"></line>
        <line x1="18.36" y1="4.22" x2="19.78" y2="5.64"></line>
      </svg>
    </button>
  </div>
</header>
