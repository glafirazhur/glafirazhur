<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-C9CJKVQ0D4"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-C9CJKVQ0D4');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if title %}{{ title }} | {{ site.name }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if description %}{{ description }}{% else %}{{ site.description }}{% endif %}">

  <!-- Theme Initialization (Pre-render FOUC Prevention) -->
  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark' || savedTheme === 'light') {
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.documentElement.style.colorScheme = savedTheme;
      }
    })();
  </script>

  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/a11y.css">
</head>

<body>
  <!-- Keyboard A11y Skip Link -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div class="site-wrapper">
    {% include "components/header.html" %}

    <main id="main-content">
      {{ content }}
    </main>

    {% include "components/footer.html" %}
  </div>

  <!-- Scripts -->
  <script src="/assets/js/theme.js" defer></script>
</body>

</html>
